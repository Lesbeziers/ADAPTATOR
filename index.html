<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Editor de Adaptaciones M+</title>
  <link rel="stylesheet" href="assets/css/base.css" />
  <link rel="stylesheet" href="assets/css/layout.css" />
  <link rel="stylesheet" href="assets/css/ui.css" />
  <link rel="stylesheet" href="assets/css/panel.css" />
  <link rel="stylesheet" href="assets/css/bottombar.css" />
</head>
<body>

<div id="app">

  <header id="header">
    <img src="assets/img/cabecera_adaptator.svg" alt="Editor de Adaptaciones M+" />
  </header>

  <div id="topbar">
    <div id="topbar-left">
      <button class="btn-mode active" id="btn-editor">Editor</button>
      <button class="btn-mode"        id="btn-ver-todas">Ver todas</button>
    </div>
    <div id="topbar-right">
      <button class="btn-action" id="btn-abrir">Abrir proyecto</button>
      <button class="btn-action" id="btn-guardar">Guardar proyecto</button>
      <button class="btn-action" id="btn-exportar">Exportar imágenes</button>
    </div>
  </div>

  <div id="main">

    <aside id="sidebar">
      <div id="panel-inner">

        <!-- MODALIDADES -->
        <section class="panel-section">
          <div class="panel-section-title">Modalidades</div>

          <!-- Dropdown custom -->
          <div class="custom-select" id="modality-dropdown">
            <div class="custom-select-trigger">
              <span class="custom-select-value" id="modality-value">Selecciona modalidad</span>
              <span class="custom-select-arrow">&#9660;</span>
            </div>
            <div class="custom-select-options" id="modality-options"></div>
          </div>

          <div id="formats-grid"></div>
        </section>

        <!-- CAPAS -->
        <section class="panel-section" id="section-layers">
          <div class="panel-section-title">Capas</div>
          <div class="layers-box">
            <input type="file" id="file-input-layer" accept="image/*" multiple style="display:none" />
            <div id="layers-list"></div>
            <div class="layers-header">
              <button class="btn-layer-action" id="btn-add-layer" title="Añadir capa">
                <img class="icon-up"   src="assets/img/mas_up.svg"   alt="+" />
                <img class="icon-down" src="assets/img/mas_down.svg" alt="+" />
              </button>
              <button class="btn-layer-action" id="btn-dup-layer" title="Duplicar capa">
                <img class="icon-up"   src="assets/img/duplicar_up.svg"   alt="duplicar" />
                <img class="icon-down" src="assets/img/duplicar_down.svg" alt="duplicar" />
              </button>
              <button class="btn-layer-action btn-layer-delete" id="btn-del-layer" title="Eliminar capa">
                <img class="icon-up"   src="assets/img/papelera_up.svg"   alt="eliminar" />
                <img class="icon-down" src="assets/img/papelera_down.svg" alt="eliminar" />
              </button>
            </div>
          </div>
        </section>

        <!-- EXTRAS -->
        <section class="panel-section" id="section-extras">
          <div class="panel-section-title">Extras</div>
          <div id="extras-grid">
            <button class="btn-extra" id="btn-extra-degradado">Degradado</button>
            <button class="btn-extra" id="btn-extra-solido">Sólido</button>
            <button class="btn-extra" id="btn-extra-texto">Texto</button>
            <button class="btn-extra" id="btn-extra-mux-txt">Texto en MUX_TXT</button>
          </div>
        </section>

      </div>
    </aside>

    <button id="btn-collapse">&#8249;</button>

    <div id="right">
      <div id="canvas-area"></div>
      <div id="inner-bar"></div>

      <!-- BOTTOMBAR: sliders -->
      <div id="bottombar">
        <div id="sliders-wrap">

          <div class="slider-group">
            <span class="slider-label-top">Escala</span>
            <input type="range" id="slider-scale" min="1" max="200" value="100" />
            <input type="text" class="slider-label-val" id="label-scale" value="100%" data-unit="%" data-min="1" data-max="200" />
          </div>

          <div class="slider-group">
            <span class="slider-label-top">Giro</span>
            <input type="range" id="slider-rotation" min="-180" max="180" value="0" />
            <input type="text" class="slider-label-val" id="label-rotation" value="0°" data-unit="°" data-min="-180" data-max="180" />
          </div>

          <div class="slider-group">
            <span class="slider-label-top">Transparencia</span>
            <input type="range" id="slider-opacity" min="0" max="100" value="100" />
            <input type="text" class="slider-label-val" id="label-opacity" value="100%" data-unit="%" data-min="0" data-max="100" />
          </div>

          <div class="slider-group">
            <span class="slider-label-top">Desenfoque</span>
            <input type="range" id="slider-blur" min="0" max="40" value="0" />
            <input type="text" class="slider-label-val" id="label-blur" value="0" data-unit="" data-min="0" data-max="40" />
          </div>

          <div class="slider-group">
            <span class="slider-label-top">Ruido</span>
            <input type="range" id="slider-noise" min="0" max="20" value="0" />
            <input type="text" class="slider-label-val" id="label-noise" value="0" data-unit="" data-min="0" data-max="20" />
          </div>

        </div>
      </div>
    </div>

  </div>

</div>

<script src="assets/js/state.js"></script>
<script src="assets/js/canvas.js"></script>
<script src="assets/js/layers.js"></script>
<script src="assets/js/formats.js"></script>
<script src="assets/js/ui.js"></script>
<script src="assets/js/extras.js"></script>
<script src="assets/js/project.js"></script>
<script src="assets/js/export.js"></script>
<script src="assets/js/app.js"></script>

<!-- MODAL DE CONFIRMACIÓN -->
<div id="confirm-overlay" style="display:none">
  <div id="confirm-box">
    <div id="confirm-message"></div>
    <div id="confirm-buttons">
      <button id="confirm-cancel">Cancelar</button>
      <button id="confirm-ok">Eliminar</button>
    </div>
  </div>
</div>

</body>
</html>
